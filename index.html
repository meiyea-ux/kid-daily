<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kid Daily</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="home-page">
    <section class="hero">
      <div class="brand-badge">KD</div>
      <p class="tagline">孩子 iPad 和 iPhone 使用情况</p>
      <h1>Kid Daily</h1>
      <p class="hero-text">
        面向中国家长的数字成长日报，帮助你快速了解孩子今天的屏幕使用时间、学习时间、娱乐时间和阅读情况。
      </p>
      <div class="home-actions">
        <a class="primary-button" href="daily.html">查看数字日报</a>
        <a class="secondary-button" href="import.html">导入真实数据</a>
      </div>
    </section>

    <section class="feature-grid" aria-label="Kid Daily 功能">
      <article class="feature-card">
        <h2>使用时间</h2>
        <p>查看孩子今天的总屏幕使用时间。</p>
      </article>
      <article class="feature-card">
        <h2>内容分类</h2>
        <p>区分学习、娱乐和阅读时间。</p>
      </article>
      <article class="feature-card">
        <h2>AI 点评</h2>
        <p>给家长一条清晰、可执行的建议。</p>
      </article>
    </section>
  </main>
</body>
</html>
